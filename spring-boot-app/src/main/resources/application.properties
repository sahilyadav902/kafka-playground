# =====================================================================
# SERVER
# =====================================================================
server.port=8081

# =====================================================================
# KAFKA — BOOTSTRAP
# =====================================================================
spring.kafka.bootstrap-servers=localhost:9092,localhost:9093,localhost:9094

# =====================================================================
# KAFKA — PRODUCER
# acks=all: wait for all ISR replicas to acknowledge before returning
# enable.idempotence: prevents duplicate messages on producer retry
# retries: retry up to 3 times on transient broker errors
# =====================================================================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.compression.type=snappy

# =====================================================================
# KAFKA — CONSUMER
# enable-auto-commit=false: manual offset commit (at-least-once delivery)
# auto-offset-reset=earliest: new consumer groups start from beginning
# max.poll.records: max messages fetched per poll (batch size ceiling)
# max.poll.interval.ms: max time between polls before rebalance triggered
# =====================================================================
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.group-id=kafka-playground-app
spring.kafka.consumer.properties.spring.json.trusted.packages=com.kafkaplayground.model
spring.kafka.consumer.properties.max.poll.records=100
spring.kafka.consumer.properties.max.poll.interval.ms=300000

# =====================================================================
# KAFKA — TOPIC NAMES (referenced in KafkaTopicConfig)
# =====================================================================
kafka.topics.orders=orders
kafka.topics.payments=payments
kafka.topics.notifications=notifications
kafka.topics.orders-dlq=orders-dlq
kafka.topics.user-profiles=user-profiles
kafka.topics.stock-prices=stock-prices
kafka.topics.audit-events=audit-events
kafka.topics.inventory=inventory-updates

# =====================================================================
# ACTUATOR
# =====================================================================
management.endpoints.web.exposure.include=health,info,metrics
